title: CAV 2027
author: International Conference on Computer Aided Verification

github:
  repository_url: https://github.com/i-cav/2027
  source:
    branch: main

navbar-links:
  Authors:
    - Call for Papers: "/cfp/"
    - Call for Workshops: "/cfw/"
    - Artifact Evaluation: "/artifacts/"
  Program:
    - Overview: "/program/"
    - Keynotes: "/keynote/"
    - Accepted Papers: "/accepted/"
    - Proceedings: "/proceedings/"
    - CAV Award: "/award/"
  Attend:
    - Venue: "/venue/"
    - Sponsors: "/sponsors/"
  Organization: "/organization/"

social-network-links:
  facebook: groups/cavconference
  twitter: confCAV
  bluesky: confcav.bsky.social

title-on-all-pages: true
edit_page_button: true
remove-ads: true

timezone: "Europe/Amsterdam"
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/

kramdown:
  input: GFM

defaults:
  - scope:
      path: ""
    values:
      layout: "page"

exclude:
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - TODO.md
  - docs/
  - vendor/

plugins:
  - jekyll-sitemap
